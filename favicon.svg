<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Two interlocked wedding rings with a small heart -->
  <!-- Left ring -->
  <circle cx="12" cy="17" r="7" fill="none" stroke="#c9a84c" stroke-width="2.8"/>
  <!-- Right ring (slightly overlapping) -->
  <circle cx="20" cy="17" r="7" fill="none" stroke="#b8603f" stroke-width="2.8"/>
  <!-- Overlap mask: cover parts of each ring where they cross to create interlocked effect -->
  <!-- White gap on left ring where right ring passes in front -->
  <path d="M17.5,11.2 A7,7,0,0,1,17.5,22.8" fill="none" stroke="#faf6f1" stroke-width="3.4"/>
  <!-- Small heart on top -->
  <path d="M16,8 C16,8 14.5,5.5 12.8,5.5 C11.1,5.5 10,6.7 10,8 C10,9.3 11,10.5 12.8,11.8 C13.8,12.5 14.6,12.9 16,13.5 C17.4,12.9 18.2,12.5 19.2,11.8 C21,10.5 22,9.3 22,8 C22,6.7 20.9,5.5 19.2,5.5 C17.5,5.5 16,8 16,8 Z" fill="#e2c4b0"/>
</svg>
